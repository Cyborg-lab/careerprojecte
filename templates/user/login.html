<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish | AutoHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        position: relative;
    }

    /* Form card - #033A39 rangida */
    .form-card {
        background: #033A39;
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(3, 58, 57, 0.25);
        width: 460px;
        max-width: 100%;
        overflow: hidden;
        transition: all 0.3s ease;
        animation: fadeInUp 0.6s ease-out;
    }

    .form-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 30px 60px -12px rgba(3, 58, 57, 0.35);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Header qismi */
    .form-header {
        padding: 36px 32px 24px;
        background: #033A39;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
        font-size: 56px;
        margin-bottom: 16px;
        animation: bounce 1s ease;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .form-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: -0.3px;
    }

    .form-header p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
    }

    /* Form body - oq fon */
    .form-body {
        padding: 32px 32px 36px;
        background: #ffffff;
    }

    /* Input group */
    .input-group {
        margin-bottom: 28px;
        position: relative;
    }

    .input-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #374151;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        transition: all 0.2s;
    }

    .input-group input {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #e5e7eb;
        border-radius: 20px;
        font-size: 15px;
        font-family: inherit;
        transition: all 0.2s ease;
        background: #ffffff;
        color: #111827;
        outline: none;
        font-weight: 500;
    }

    .input-group input:focus {
        border-color: #033A39;
        box-shadow: 0 0 0 4px rgba(3, 58, 57, 0.1);
    }

    .input-group input::placeholder {
        color: #cbd5e1;
        font-weight: 400;
    }

    /* Password wrapper */
    .password-wrapper {
        position: relative;
    }

    .toggle-password {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 18px;
        user-select: none;
        background: none;
        border: none;
        font-size: 18px;
        padding: 0;
        width: auto;
        background: transparent;
        color: #9ca3af;
        transition: color 0.2s;
    }

    .toggle-password:hover {
        color: #033A39;
        transform: translateY(-50%) scale(1.1);
    }

    /* Error message */
    .error-message {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 13px;
        margin-bottom: 24px;
        display: none;
        align-items: center;
        gap: 8px;
        border-left: 3px solid #dc2626;
        animation: shake 0.5s ease;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    .error-message.show {
        display: flex;
    }

    /* Success message */
    .success-message {
        background: #d1fae5;
        color: #065f46;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 13px;
        margin-bottom: 24px;
        display: none;
        align-items: center;
        gap: 8px;
        border-left: 3px solid #10b981;
    }

    .success-message.show {
        display: flex;
    }

    /* Button */
    .login-btn {
        width: 100%;
        padding: 16px;
        background: #033A39;
        border: none;
        border-radius: 24px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
        margin-top: 8px;
    }

    .login-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s;
    }

    .login-btn:hover::before {
        left: 100%;
    }

    .login-btn:hover {
        background: #044c4b;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -8px rgba(3, 58, 57, 0.4);
    }

    .login-btn:active {
        transform: translateY(0);
    }

    .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* Register link */
    .register-link {
        display: block;
        text-align: center;
        margin-top: 24px;
        color: #6b7280;
        text-decoration: none;
        font-size: 14px;
        transition: all 0.2s;
        font-weight: 500;
    }

    .register-link:hover {
        color: #033A39;
        text-decoration: underline;
    }

    /* Loading spinner */
    .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 520px) {
        .form-header {
            padding: 28px 24px 20px;
        }
        
        .form-body {
            padding: 28px 24px 32px;
        }
        
        .form-header h1 {
            font-size: 24px;
        }
        
        .logo {
            font-size: 48px;
        }
        
        .input-group input {
            padding: 12px 16px;
        }
    }
</style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <div class="logo">🚗</div>
        <h1>Xush kelibsiz</h1>
        <p>AutoHub'ga kiring</p>
    </div>
    
    <div class="form-body">
        <div class="error-message" id="errorMsg">
            ⚠️ <span id="errorText">Xatolik yuz berdi!</span>
        </div>
        
        <div class="success-message" id="successMsg">
            ✅ <span id="successText">Muvaffaqiyatli!</span>
        </div>
        
        <form id="loginForm" method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <label>FOYDALANUVCHI NOMI</label>
                <input type="text" id="username" name="username" placeholder="username123" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>PAROL</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••">
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            
            <button type="submit" id="loginBtn" class="login-btn">
                <span>Kirish</span>
                <span>→</span>
            </button>
        </form>
        
        <a class="register-link" href="{% url 'user:register' %}">
            Akkauntingiz yo'qmi? Ro'yxatdan o'ting
        </a>
    </div>
</div>

<script>
    // DOM elementlari
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsgDiv = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const successMsgDiv = document.getElementById('successMsg');
    const successText = document.getElementById('successText');
    
    // Parolni ko'rsatish/yashirish
    function togglePassword() {
        const toggleBtn = document.querySelector('.toggle-password');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = '🙈';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = '👁️';
        }
    }
    
    // Xatolikni ko'rsatish
    function showError(message) {
        errorText.textContent = message;
        errorMsgDiv.classList.add('show');
        successMsgDiv.classList.remove('show');
        
        // 3 sekunddan keyin avtomatik yashirish
        setTimeout(() => {
            errorMsgDiv.classList.remove('show');
        }, 3000);
    }
    
    // Muvaffaqiyat xabarini ko'rsatish
    function showSuccess(message) {
        successText.textContent = message;
        successMsgDiv.classList.add('show');
        errorMsgDiv.classList.remove('show');
        
        setTimeout(() => {
            successMsgDiv.classList.remove('show');
        }, 3000);
    }
    
    // Loading holati
    function setLoading(isLoading) {
        if (isLoading) {
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span><span> Kutilmoqda...</span>';
        } else {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<span>Kirish</span><span>→</span>';
        }
    }
    
    // Real-time validatsiya
    function validateUsername(username) {
        if (username.length === 0) return true;
        if (username.length < 3) {
            usernameInput.style.borderColor = '#ef4444';
            return false;
        }
        usernameInput.style.borderColor = '#10b981';
        return true;
    }
    
    function validatePassword(password) {
        if (password.length === 0) return true;
        if (password.length < 6) {
            passwordInput.style.borderColor = '#ef4444';
            return false;
        }
        passwordInput.style.borderColor = '#10b981';
        return true;
    }
    
    // Input tekshirish
    usernameInput.addEventListener('input', function() {
        const isValid = validateUsername(this.value.trim());
        if (!isValid && this.value.length > 0) {
            // Xatolikni ko'rsatmaymiz, faqat border rangini o'zgartiramiz
        } else if (this.value.length === 0) {
            this.style.borderColor = '#e5e7eb';
        }
        clearMessages();
    });
    
    passwordInput.addEventListener('input', function() {
        const isValid = validatePassword(this.value);
        if (!isValid && this.value.length > 0) {
            // Xatolikni ko'rsatmaymiz
        } else if (this.value.length === 0) {
            this.style.borderColor = '#e5e7eb';
        }
        clearMessages();
    });
    
    function clearMessages() {
        errorMsgDiv.classList.remove('show');
        successMsgDiv.classList.remove('show');
    }
    
    // Form validatsiya
    function validateForm(username, password) {
        let errors = [];
        
        if (!username || username.trim().length === 0) {
            errors.push('Foydalanuvchi nomini kiriting');
            usernameInput.style.borderColor = '#ef4444';
        } else if (username.length < 3) {
            errors.push('Foydalanuvchi nomi kamida 3 belgidan iborat bo\'lishi kerak');
            usernameInput.style.borderColor = '#ef4444';
        } else {
            usernameInput.style.borderColor = '#10b981';
        }
        
        if (!password || password.length === 0) {
            errors.push('Parolni kiriting');
            passwordInput.style.borderColor = '#ef4444';
        } else if (password.length < 6) {
            errors.push('Parol kamida 6 belgidan iborat bo\'lishi kerak');
            passwordInput.style.borderColor = '#ef4444';
        } else {
            passwordInput.style.borderColor = '#10b981';
        }
        
        return errors;
    }
    
    // Form submit
    form.addEventListener('submit', async function(e) {
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const errors = validateForm(username, password);
        
        if (errors.length > 0) {
            showError(errors[0]);
            return;
        }
        
        // Loading holatini ko'rsatish
        setLoading(true);
        
        // Simulyatsiya qilingan login (aslida serverga so'rov yuboriladi)
        // Bu yerda siz haqiqiy AJAX so'rovni qo'shishingiz mumkin
        setTimeout(() => {
            // Muvaffaqiyatli login simulyatsiyasi
            showSuccess('Tizimga muvaffaqiyatli kirdingiz!');
            setLoading(false);
            
            // Haqiqiy form submit qilish (agar hamma narsa to'g'ri bo'lsa)
            // form.submit();
            
            // Eslatma: Haqiqiy server so'rovi uchun quyidagi kodni ishlating:
            /*
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showSuccess('Tizimga muvaffaqiyatli kirdingiz!');
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 1000);
                } else {
                    showError(data.error || 'Login yoki parol xato');
                }
                setLoading(false);
            })
            .catch(error => {
                showError('Server bilan bog\'lanishda xatolik');
                setLoading(false);
            });
            */
            
        }, 1500);
    });
    
    // Input fokuslanganda xatolikni yashirish
    usernameInput.addEventListener('focus', () => {
        clearMessages();
        usernameInput.style.borderColor = '#033A39';
    });
    
    passwordInput.addEventListener('focus', () => {
        clearMessages();
        passwordInput.style.borderColor = '#033A39';
    });
    
    // Sayt yuklanganda demo xabar (ixtiyoriy)
    // window.onload = () => {
    //     showSuccess('Xush kelibsiz!');
    // }
</script>

</body>
</html>
