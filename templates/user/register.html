<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ro'yxatdan o'tish | AutoHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    /* Form card - #033A39 rangida */
    .form-card {
        background: #033A39;
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(3, 58, 57, 0.25);
        width: 460px;
        max-width: 100%;
        overflow: hidden;
        transition: all 0.3s ease;
        animation: fadeInUp 0.6s ease-out;
    }

    .form-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 30px 60px -12px rgba(3, 58, 57, 0.35);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Header qismi */
    .form-header {
        padding: 36px 32px 24px;
        background: #033A39;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
        font-size: 48px;
        margin-bottom: 16px;
    }

    .form-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: -0.3px;
    }

    .form-header p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
    }

    /* Form body - oq fon */
    .form-body {
        padding: 32px 32px 36px;
        background: #ffffff;
    }

    /* Input group */
    .input-group {
        margin-bottom: 24px;
    }

    .input-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #374151;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
    }

    .input-group input {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #e5e7eb;
        border-radius: 20px;
        font-size: 15px;
        font-family: inherit;
        transition: all 0.2s ease;
        background: #ffffff;
        color: #111827;
        outline: none;
        font-weight: 500;
    }

    .input-group input:focus {
        border-color: #033A39;
        box-shadow: 0 0 0 4px rgba(3, 58, 57, 0.1);
    }

    .input-group input::placeholder {
        color: #cbd5e1;
        font-weight: 400;
    }

    /* Password wrapper */
    .password-wrapper {
        position: relative;
    }

    .toggle-password {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 18px;
        user-select: none;
        background: none;
        border: none;
        font-size: 18px;
    }

    /* Error message */
    .error-message {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 13px;
        margin-bottom: 24px;
        display: none;
        align-items: center;
        gap: 8px;
        border-left: 3px solid #dc2626;
    }

    .error-message.show {
        display: flex;
    }

    /* Button */
    .register-btn {
        width: 100%;
        padding: 16px;
        background: #033A39;
        border: none;
        border-radius: 24px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
        margin-top: 8px;
    }

    .register-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s;
    }

    .register-btn:hover::before {
        left: 100%;
    }

    .register-btn:hover {
        background: #044c4b;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -8px rgba(3, 58, 57, 0.4);
    }

    .register-btn:active {
        transform: translateY(0);
    }

    /* Login link */
    .login-link {
        display: block;
        text-align: center;
        margin-top: 24px;
        color: #6b7280;
        text-decoration: none;
        font-size: 14px;
        transition: all 0.2s;
        font-weight: 500;
    }

    .login-link:hover {
        color: #033A39;
        text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 520px) {
        .form-header {
            padding: 28px 24px 20px;
        }
        
        .form-body {
            padding: 28px 24px 32px;
        }
        
        .form-header h1 {
            font-size: 24px;
        }
        
        .logo {
            font-size: 40px;
        }
        
        .input-group input {
            padding: 12px 16px;
        }
    }
</style>
</head>
<body>

    <div class="form-card">
        <div class="form-header">
            <div class="logo">🚗</div>
            <h1>Ro'yxatdan o'tish</h1>
            <p>AutoHub'ga xush kelibsiz</p>
        </div>
        
        <div class="form-body">
            <div class="error-message" id="errorMsg">
                ⚠️ <span id="errorText">Iltimos, barcha maydonlarni to'g'ri to'ldiring!</span>
            </div>
            <form id="registerForm" method="POST" action="{% url 'user:register' %}">
    {% csrf_token %}
            
                
                <div class="input-group">
                    <label>Foydalanuvchi nomi</label>
                    <input type="text" id="username" name="username" placeholder="Masalan: john_doe" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Email manzil</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com">
                </div>
                
                <div class="input-group">
                    <label>Parol</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Kamida 6 belgi">
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                </div>
                
                <button type="submit" class="register-btn">
                    <span>Ro'yxatdan o'tish</span>
                    <span>→</span>
                </button>
            </form>
            
            <a class="login-link" href="{% url 'user:login' %}">Akkauntingiz bormi? Kirish</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const errorMsgDiv = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
    
    // Parolni ko'rsatish/yashirish
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.toggle-password');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = '🙈';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = '👁️';
        }
    }
    
    // Validatsiya funksiyasi
    function validateForm(username, email, password) {
        let errors = [];
        
        // Username tekshirish
        if (!username || username.length < 3) {
            errors.push('Foydalanuvchi nomi kamida 3 belgidan iborat bo\'lishi kerak');
        }
        
        // Email tekshirish
        const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!email || !emailPattern.test(email)) {
            errors.push('To\'g\'ri email manzil kiriting (masalan: name@example.com)');
        }
        
        // Password tekshirish
        if (!password || password.length < 6) {
            errors.push('Parol kamida 6 belgidan iborat bo\'lishi kerak');
        }
        
        return errors;
    }
    
    // Real-time validatsiya
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    
    function clearError() {
        errorMsgDiv.classList.remove('show');
    }
    
    function showError(message) {
        errorText.textContent = message;
        errorMsgDiv.classList.add('show');
    }
    
    // Inputlarni tekshirish (real-time)
    usernameInput.addEventListener('input', function() {
        if (this.value.length >= 3) {
            this.style.borderColor = '#10b981';
            clearError();
        } else if (this.value.length > 0) {
            this.style.borderColor = '#ef4444';
        } else {
            this.style.borderColor = '#e5e7eb';
        }
    });
    
    emailInput.addEventListener('input', function() {
        const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (emailPattern.test(this.value)) {
            this.style.borderColor = '#10b981';
            clearError();
        } else if (this.value.length > 0) {
            this.style.borderColor = '#ef4444';
        } else {
            this.style.borderColor = '#e5e7eb';
        }
    });
    
    passwordInput.addEventListener('input', function() {
        if (this.value.length >= 6) {
            this.style.borderColor = '#10b981';
            clearError();
        } else if (this.value.length > 0) {
            this.style.borderColor = '#ef4444';
        } else {
            this.style.borderColor = '#e5e7eb';
        }
    });

    // Form submit validatsiya
    form.addEventListener('submit', function(e) {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        const errors = validateForm(username, email, password);
        
        if (errors.length > 0) {
            e.preventDefault();
            showError(errors[0]);
            
            // Xatolik bo'lgan inputlarni qizil rang bilan belgilash
            if (username.length < 3) document.getElementById('username').style.borderColor = '#ef4444';
            if (!/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email)) document.getElementById('email').style.borderColor = '#ef4444';
            if (password.length < 6) document.getElementById('password').style.borderColor = '#ef4444';
        } else {
            errorMsgDiv.classList.remove('show');
        }
    });
    
    // Input fokuslanganda xatolikni yashirish
    [usernameInput, emailInput, passwordInput].forEach(input => {
        input.addEventListener('focus', () => {
            clearError();
            input.style.borderColor = '#033A39';
        });
    });
</script>

</body>
</html>
